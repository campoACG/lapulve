          </div>
        </div>
        <div style="background:var(--bg-soft);border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Total retirado</div>
          <div class="mono" style="font-size:22px;font-weight:700;color:var(--rust)">${fmtMoney(inf.total)}</div>
          <div style="font-size:11px;color:var(--ink-3)">${inf.cantidad} ${inf.cantidad === 1 ? 'retiro' : 'retiros'}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="background:var(--dark);color:var(--on-dark);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--on-dark-2);text-transform:uppercase;letter-spacing:.06em">Utilidad asignada</div>
            <div class="mono" style="font-size:13px;font-weight:700;color:var(--gold-soft)">${fmtMoney(utilidadAsignada)}</div>
          </div>
          <div style="background:var(--dark);color:var(--on-dark);border-radius:8px;padding:10px">
            <div style="font-size:9px;color:var(--on-dark-2);text-transform:uppercase;letter-spacing:.06em">Saldo disponible</div>
            <div class="mono" style="font-size:13px;font-weight:700;color:${saldo >= 0 ? '#a8e07a' : '#e0855a'}">${fmtMoney(saldo)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const rows = retiros.map(r => `
    <tr>
      <td>${fechaCorta(r.fecha)}</td>
      <td><span class="badge ${r.socio === (cfg.socioA || '') ? 'badge-ok' : 'badge-warn'}">${esc(r.socio || '—')}</span></td>
      <td style="text-align:right" class="mono" style="font-weight:700">${fmtMoney(r.monto)}</td>
      <td>${esc(r.origen || '—')}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn btn-sm btn-secondary" onclick="editarRetiro('${r.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="eliminarRetiro('${r.id}')" style="margin-left:4px">🗑</button>
      </td>
    </tr>
  `).join('');

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:24px">
      ${cardsSocios}
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600">💰 Historial de retiros</h3>
      <button class="btn btn-primary" onclick="nuevoRetiro()">+ Retiro</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Socio</th>
            <th style="text-align:right">Monto</th>
            <th>Origen</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--ink-3);padding:40px">Sin retiros registrados</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function formRetiro(r) {
  const cfg = S.config || {};
  r = r || { fecha: hoy() };
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Fecha</label>
        <input id="ret-fecha" type="date" value="${esc(r.fecha || hoy())}"></div>
      <div class="field"><label>Socio</label>
        <select id="ret-socio">
          <option value="">— Seleccionar —</option>
          <option value="${esc(cfg.socioA || 'Socio A')}"${r.socio === (cfg.socioA || 'Socio A') ? ' selected' : ''}>${esc(cfg.socioA || 'Socio A')}</option>
          <option value="${esc(cfg.socioB || 'Socio B')}"${r.socio === (cfg.socioB || 'Socio B') ? ' selected' : ''}>${esc(cfg.socioB || 'Socio B')}</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Monto ($)</label>
      <input id="ret-monto" type="number" step="0.01" value="${r.monto || ''}"></div>
    <div class="field"><label>Origen del fondo (opcional)</label>
      <input id="ret-origen" value="${esc(r.origen || '')}" placeholder="Ej: AGRO LA PULVE, caja, banco..."></div>
  `;
}

function nuevoRetiro() {
  showModal('Nuevo retiro de socio', formRetiro({}) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarRetiro()">Guardar</button>
    </div>
  `);
}

function editarRetiro(id) {
  const r = (S.retirosSocios || []).find(x => x.id === id);
  if (!r) return;
  showModal('Editar retiro', formRetiro(r) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarRetiro('${r.id}')">Guardar</button>
    </div>
  `);
}

function guardarRetiro(id) {
  const datos = {
    fecha: document.getElementById('ret-fecha').value,
    socio: document.getElementById('ret-socio').value,
    monto: parseFloat(document.getElementById('ret-monto').value) || 0,
    origen: document.getElementById('ret-origen').value.trim(),
  };
  if (!datos.fecha) return toast('Ingresá la fecha', 'warn');
  if (!datos.socio) return toast('Seleccioná el socio', 'warn');
  if (!datos.monto || datos.monto <= 0) return toast('Ingresá el monto', 'warn');
  if (id) {
    const existing = S.retirosSocios.find(x => x.id === id);
    S.retirosSocios = S.retirosSocios.map(x => x.id === id ? { ...existing, ...datos } : x);
  } else {
    datos.id = 'ret_' + Date.now() + '_' + uid().slice(0, 4);
    S.retirosSocios = [...(S.retirosSocios || []), datos];
  }
  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Retiro actualizado ✓' : 'Retiro registrado ✓');
}

async function eliminarRetiro(id) {
  const r = S.retirosSocios.find(x => x.id === id);
  if (!r) return;
  if (!await confirmar(`¿Eliminar retiro de ${r.socio} (${fmtMoney(r.monto)})?`, { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;
  moverAPapelera('retiroSocio', r);
  S.retirosSocios = S.retirosSocios.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Retiro eliminado');
}

// ════════════════════════════════════════════════════════════════════
// MÓDULO: REPORTES
// ════════════════════════════════════════════════════════════════════

function renderReportes() {
  const cfg = S.config || {};
  const tc = Number(cfg.tcActual || 1);

  // 1. Resumen financiero (los ingresos vienen de FACTURAS no anuladas)
  const facturasValidas = (S.facturas || []).filter(f => f.estado !== 'anulada');
  const ingresosNetos = facturasValidas.reduce((a, f) => a + (Number(f.neto) || 0), 0);
  const ingresosIVA = facturasValidas.reduce((a, f) => a + (Number(f.iva) || 0), 0);
  const ingresosTotal = facturasValidas.reduce((a, f) => a + (Number(f.total) || 0), 0);
  // Hectáreas: tomamos del módulo Ingresos (trabajos), porque es la métrica operativa
  const totalHas = (S.trabajos || []).reduce((a, t) => a + (Number(t.has) || 0), 0);

  const gastosNetos = (S.gastos || []).reduce((a, g) => a + (Number(g.neto) || 0), 0);
  const gastosIVA = (S.gastos || []).filter(g => g.conFactura === true || g.conFactura === 'TRUE' || g.conFactura === 'true').reduce((a, g) => a + (Number(g.iva) || 0), 0);
  const gastosTotal = (S.gastos || []).reduce((a, g) => a + (Number(g.total) || Number(g.neto) || 0), 0);

  const utilidad = ingresosNetos - gastosNetos;
  const posicionIVA = ingresosIVA - gastosIVA;

  // 2. Por mes (12 meses para atrás)
  // Los ingresos del mes vienen de FACTURAS, las has vienen de TRABAJOS
  const meses = {};
  facturasValidas.forEach(f => {
    const k = String(f.fecha || '').slice(0, 7);
    if (!k) return;
    if (!meses[k]) meses[k] = { ingresos: 0, gastos: 0, has: 0 };
    meses[k].ingresos += Number(f.neto) || 0;
  });
  (S.trabajos || []).forEach(t => {
    const k = String(t.fecha || '').slice(0, 7);
    if (!k) return;
    if (!meses[k]) meses[k] = { ingresos: 0, gastos: 0, has: 0 };
    meses[k].has += Number(t.has) || 0;
  });
  (S.gastos || []).forEach(g => {
    const k = String(g.fecha || '').slice(0, 7);
    if (!k) return;
    if (!meses[k]) meses[k] = { ingresos: 0, gastos: 0, has: 0 };
    meses[k].gastos += Number(g.neto) || Number(g.total) || 0;
  });
  const mesesOrdenados = Object.keys(meses).sort().reverse().slice(0, 12);

  // 3. Por cliente (basado en facturas, no trabajos)
  const porCliente = {};
  facturasValidas.forEach(f => {
    if (!f.clienteId) return;
    if (!porCliente[f.clienteId]) porCliente[f.clienteId] = { total: 0, has: 0, cantidad: 0 };
    porCliente[f.clienteId].total += Number(f.total) || 0;
    porCliente[f.clienteId].has += Number(f.has) || 0;
    porCliente[f.clienteId].cantidad += 1;
  });
  const clientesRank = Object.entries(porCliente)
    .map(([cid, d]) => ({ cliente: S.clientes.find(c => c.id === cid), ...d }))
    .filter(x => x.cliente)
    .sort((a, b) => b.total - a.total);

  // 4. Por categoría de gasto
  const porCategoria = {};
  (S.gastos || []).forEach(g => {
    const cat = g.categoria || '(sin categoría)';
    if (!porCategoria[cat]) porCategoria[cat] = 0;
    porCategoria[cat] += Number(g.total) || Number(g.neto) || 0;
  });
  const catsRank = Object.entries(porCategoria).sort((a, b) => b[1] - a[1]);

  // 5. Evolución del precio
  const preciosHist = (S.preciosHistorico || []).slice().sort((a, b) => String(a.desde).localeCompare(String(b.desde)));

  return `
    <!-- Resumen financiero -->
    <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:14px">📊 Resumen financiero del ejercicio</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px">
      <div class="card" style="border-top:3px solid var(--ok)">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Ingresos netos</div>
        <div class="mono" style="font-size:22px;font-weight:700;color:var(--ok);margin-top:4px">${fmtMoney(ingresosNetos)}</div>
        <div style="font-size:11px;color:var(--ink-3)">${(S.trabajos || []).length} trabajos · ${fmt(totalHas, 0)} ha</div>
      </div>
      <div class="card" style="border-top:3px solid var(--rust)">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Gastos netos</div>
        <div class="mono" style="font-size:22px;font-weight:700;color:var(--rust);margin-top:4px">${fmtMoney(gastosNetos)}</div>
        <div style="font-size:11px;color:var(--ink-3)">${(S.gastos || []).length} gastos</div>
      </div>
      <div class="card" style="border-top:3px solid var(--accent);background:linear-gradient(135deg,var(--bg-card),var(--bg-soft))">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Utilidad del ejercicio</div>
        <div class="mono" style="font-size:24px;font-weight:700;color:${utilidad >= 0 ? 'var(--ok)' : 'var(--rust)'};margin-top:4px">${fmtMoney(utilidad)}</div>
        <div style="font-size:11px;color:var(--ink-3)">${ingresosNetos > 0 ? 'Margen ' + fmt((utilidad / ingresosNetos) * 100, 1) + '%' : ''}</div>
      </div>
      <div class="card" style="border-top:3px solid var(--gold)">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Posición IVA</div>
        <div class="mono" style="font-size:22px;font-weight:700;color:var(--gold);margin-top:4px">${fmtMoney(posicionIVA)}</div>
        <div style="font-size:11px;color:var(--ink-3)">Déb. ${fmt(ingresosIVA, 2)} − Cré. ${fmt(gastosIVA, 2)}</div>
      </div>
      <div class="card">
        <div style="font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Utilidad / hectárea</div>
        <div class="mono" style="font-size:22px;font-weight:700;margin-top:4px">${totalHas > 0 ? fmtMoney(utilidad / totalHas) : '—'}</div>
        <div style="font-size:11px;color:var(--ink-3)">Sobre ${fmt(totalHas, 0)} ha</div>
      </div>
    </div>

    <!-- Evolución mensual -->
    <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:14px">📅 Evolución mensual</h3>
    <div class="card" style="margin-bottom:24px;padding:0;overflow-x:auto">
      ${mesesOrdenados.length === 0
        ? '<div style="text-align:center;color:var(--ink-3);padding:40px">Sin datos para mostrar</div>'
        : `<table>
          <thead><tr><th>Mes</th><th style="text-align:right">Hectáreas</th><th style="text-align:right">Ingresos</th><th style="text-align:right">Gastos</th><th style="text-align:right">Resultado</th></tr></thead>
          <tbody>
            ${mesesOrdenados.map(k => {
              const m = meses[k];
              const r = m.ingresos - m.gastos;
              return `<tr>
                <td><b>${k}</b></td>
                <td style="text-align:right" class="mono">${fmt(m.has, 0)} ha</td>
                <td style="text-align:right" class="mono" style="color:var(--ok)">${fmtMoney(m.ingresos)}</td>
                <td style="text-align:right" class="mono" style="color:var(--rust)">${fmtMoney(m.gastos)}</td>
                <td style="text-align:right" class="mono" style="font-weight:700;color:${r >= 0 ? 'var(--ok)' : 'var(--rust)'}">${fmtMoney(r)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>

    <!-- Ranking de clientes -->
    <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:14px">👥 Top clientes</h3>
    <div class="card" style="margin-bottom:24px;padding:0">
      ${clientesRank.length === 0
        ? '<div style="text-align:center;color:var(--ink-3);padding:40px">Sin datos</div>'
        : `<table>
          <thead><tr><th>Cliente</th><th style="text-align:right">Trabajos</th><th style="text-align:right">Hectáreas</th><th style="text-align:right">Facturado</th><th>%</th></tr></thead>
          <tbody>
            ${clientesRank.map(c => {
              const pct = ingresosTotal > 0 ? (c.total / ingresosTotal) * 100 : 0;
              return `<tr>
                <td><b>${esc(c.cliente.razonSocial)}</b></td>
                <td style="text-align:right" class="mono">${c.cantidad}</td>
                <td style="text-align:right" class="mono">${fmt(c.has, 0)} ha</td>
                <td style="text-align:right" class="mono" style="font-weight:700">${fmtMoney(c.total)}</td>
                <td><div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:6px;background:var(--bg-soft);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--accent)"></div></div><span style="font-size:11px;color:var(--ink-3)">${fmt(pct, 0)}%</span></div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>

    <!-- Gastos por categoría -->
    <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:14px">💸 Gastos por categoría</h3>
    <div class="card" style="margin-bottom:24px;padding:0">
      ${catsRank.length === 0
        ? '<div style="text-align:center;color:var(--ink-3);padding:40px">Sin gastos cargados</div>'
        : `<table>
          <thead><tr><th>Categoría</th><th style="text-align:right">Total</th><th>%</th></tr></thead>
          <tbody>
            ${catsRank.map(([cat, val]) => {
              const pct = gastosTotal > 0 ? (val / gastosTotal) * 100 : 0;
              return `<tr>
                <td><b>${esc(cat)}</b></td>
                <td style="text-align:right" class="mono" style="font-weight:700">${fmtMoney(val)}</td>
                <td><div style="display:flex;align-items:center;gap:6px"><div style="width:80px;height:6px;background:var(--bg-soft);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--rust)"></div></div><span style="font-size:11px;color:var(--ink-3)">${fmt(pct, 0)}%</span></div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>

    <!-- Evolución del precio -->
    <h3 style="font-family:var(--font-display);font-size:18px;font-weight:600;margin-bottom:14px">📈 Histórico de precios</h3>
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn btn-sm btn-primary" onclick="nuevoPrecioHistorico()">+ Cargar nuevo precio</button>
    </div>
    <div class="card" style="margin-bottom:24px;padding:0">
      ${preciosHist.length === 0
        ? '<div style="text-align:center;color:var(--ink-3);padding:40px">Sin historial</div>'
        : `<table>
          <thead><tr><th>Vigente desde</th><th style="text-align:right">Precio $/ha</th><th style="text-align:right">USD/ha</th><th></th></tr></thead>
          <tbody>
            ${preciosHist.map(p => `<tr>
              <td><b>${fechaCorta(p.desde)}</b></td>
              <td style="text-align:right" class="mono" style="font-weight:700">${fmtMoney(p.precioARS)}</td>
              <td style="text-align:right" class="mono" style="color:var(--gold)">${fmt(p.precioUSD, 2)}</td>
              <td style="text-align:right;white-space:nowrap">
                <button class="btn btn-sm btn-secondary" onclick="editarPrecioHistorico('${p.id}')">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="eliminarPrecioHistorico('${p.id}')" style="margin-left:4px">🗑</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`}
    </div>
  `;
}

function formPrecioHistorico(p) {
  p = p || { desde: hoy() };
  return `
    <div class="field"><label>Vigente desde</label>
      <input id="ph-desde" type="date" value="${esc(p.desde || hoy())}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Precio en pesos ($/ha)</label>
        <input id="ph-ars" type="number" step="0.01" value="${p.precioARS || ''}"></div>
      <div class="field"><label>Precio en USD ($/ha)</label>
        <input id="ph-usd" type="number" step="0.01" value="${p.precioUSD || ''}"></div>
    </div>
  `;
}

function nuevoPrecioHistorico() {
  showModal('Cargar nuevo precio', formPrecioHistorico({}) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPrecioHistorico()">Guardar</button>
    </div>
  `);
}

function editarPrecioHistorico(id) {
  const p = (S.preciosHistorico || []).find(x => x.id === id);
  if (!p) return;
  showModal('Editar precio', formPrecioHistorico(p) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPrecioHistorico('${p.id}')">Guardar</button>
    </div>
  `);
}

function guardarPrecioHistorico(id) {
  const datos = {
    desde: document.getElementById('ph-desde').value,
    precioARS: parseFloat(document.getElementById('ph-ars').value) || 0,
    precioUSD: parseFloat(document.getElementById('ph-usd').value) || 0,
  };
  if (!datos.desde) return toast('Ingresá la fecha', 'warn');
  if (!datos.precioARS) return toast('Ingresá el precio en pesos', 'warn');
  if (id) {
    const existing = S.preciosHistorico.find(x => x.id === id);
    S.preciosHistorico = S.preciosHistorico.map(x => x.id === id ? { ...existing, ...datos } : x);
  } else {
    datos.id = 'pr_' + Date.now() + '_' + uid().slice(0, 4);
    S.preciosHistorico = [...(S.preciosHistorico || []), datos];
  }
  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Precio actualizado ✓' : 'Precio guardado ✓');
}

async function eliminarPrecioHistorico(id) {
  if (!await confirmar('¿Eliminar este registro del histórico?', { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;
  S.preciosHistorico = S.preciosHistorico.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Eliminado');
}

// ════════════════════════════════════════════════════════════════════
// PAPELERA — soporte común
// ════════════════════════════════════════════════════════════════════

function moverAPapelera(tipo, registro) {
  const item = {
    id: 'pap_' + Date.now() + '_' + uid().slice(0, 4),
    tipo,
    fechaEliminacion: new Date().toISOString().slice(0, 19).replace('T', ' '),
    eliminadoPor: SESSION.usuario || '',
    datos: JSON.parse(JSON.stringify(registro)),
  };
  S.papelera = [item, ...(S.papelera || [])];
}

const PAPELERA_TIPOS = {
  cliente:       { array: 'clientes',         label: 'Cliente',           icon: '👥' },
  proveedor:     { array: 'proveedores',      label: 'Proveedor',         icon: '🏢' },
  operario:      { array: 'operarios',        label: 'Operario',          icon: '👷' },
  cheque:        { array: 'cheques',          label: 'Cheque',            icon: '📑' },
  cuotaMaquina:  { array: 'cuotasMaquina',    label: 'Cuota máquina',     icon: '🚜' },
  gasto:         { array: 'gastos',           label: 'Gasto',             icon: '💸' },
  ingreso:       { array: 'trabajos',         label: 'Ingreso',           icon: '🌾' },
  factura:       { array: 'facturas',         label: 'Factura',           icon: '🧾' },
  retiroSocio:   { array: 'retirosSocios',    label: 'Retiro de socio',   icon: '🤝' },
};

// Botón "Papelera" en el sidebar lo agrego al final del módulo Configuración o desde el menú de usuario.
// Para mantenerlo simple, lo accedemos como sub-sección de Configuración (o desde un botón en el header).
function renderPapelera() {
  const items = S.papelera || [];
  const cards = items.map(item => {
    const info = PAPELERA_TIPOS[item.tipo] || { label: item.tipo, icon: '📄' };
    const datos = item.datos || {};
    let descripcion = '';
    if (item.tipo === 'cliente') descripcion = datos.razonSocial || '—';
    else if (item.tipo === 'proveedor') descripcion = datos.razonSocial || '—';
    else if (item.tipo === 'operario') descripcion = datos.nombre || '—';
    else if (item.tipo === 'cheque') descripcion = `N° ${datos.numero} · ${datos.emisor || ''} · ${fmtMoney(datos.monto)}`;
    else if (item.tipo === 'cuotaMaquina') descripcion = `Cuota ${datos.numero} · ${fmtUSD(datos.totalUSD)}`;
    else if (item.tipo === 'gasto') descripcion = `${datos.concepto || '—'} · ${fmtMoney(datos.total)}`;
    else if (item.tipo === 'ingreso') {
      const cli = S.clientes.find(c => c.id === datos.clienteId);
      descripcion = `${cli ? cli.razonSocial : 'Pool libre'} · ${fmt(datos.has, 2)} ha · ${fmtMoney(datos.monto || datos.total || 0)}`;
    }
    else if (item.tipo === 'factura') descripcion = `${datos.numero || ''} · ${fmtMoney(datos.total)}`;
    else if (item.tipo === 'retiroSocio') descripcion = `${datos.socio || ''} · ${fmtMoney(datos.monto)}`;
    return `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:14px">${info.icon}</span>
              <span style="font-size:10px;font-weight:700;color:var(--rust);text-transform:uppercase;letter-spacing:.1em">${info.label}</span>
            </div>
            <div style="font-weight:600;margin-bottom:4px">${esc(descripcion)}</div>
            <div style="font-size:11px;color:var(--ink-3)">🕐 ${esc(item.fechaEliminacion)}${item.eliminadoPor ? ' · 👤 ' + esc(item.eliminadoPor) : ''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
            <button class="btn btn-sm btn-secondary" onclick="restaurarPapelera('${item.id}')">♻️ Restaurar</button>
            <button class="btn btn-sm btn-danger" onclick="eliminarDefinitivo('${item.id}')">🔥 Definitivo</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div style="background:var(--bg-soft);border-radius:10px;padding:14px;margin-bottom:18px;font-size:13px;color:var(--ink-2);line-height:1.5">
      💡 Cuando eliminás algo, queda guardado acá. Podés restaurarlo o eliminarlo definitivamente.
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:var(--ink-2)">${items.length} ${items.length === 1 ? 'elemento' : 'elementos'} en papelera</div>
      ${items.length > 0 ? `<button class="btn btn-danger btn-sm" onclick="vaciarPapelera()">🧹 Vaciar todo</button>` : ''}
    </div>

    ${cards || '<div class="placeholder"><div class="ph-icon">🗑️</div><div class="ph-title">La papelera está vacía</div><div class="ph-text">No hay elementos eliminados.</div></div>'}
  `;
}

async function restaurarPapelera(itemId) {
  const item = (S.papelera || []).find(x => x.id === itemId);
  if (!item) return;
  const info = PAPELERA_TIPOS[item.tipo];
  if (!info) return toast('Tipo desconocido', 'danger');
  const arrayName = info.array;
  const datos = item.datos;
  // Si ya existe uno con ese id, preguntar
  const existe = (S[arrayName] || []).some(x => x.id === datos.id);
  if (existe) {
    if (!await confirmar('Ya existe un elemento con el mismo ID. ¿Restaurar igual? (se sobrescribirá)', { textoConfirmar: 'Restaurar' })) return;
    S[arrayName] = S[arrayName].map(x => x.id === datos.id ? datos : x);
  } else {
    S[arrayName] = [datos, ...(S[arrayName] || [])];
  }
  S.papelera = S.papelera.filter(x => x.id !== itemId);
  saveState();
  renderModulo();
  toast('Restaurado ✓');
}

async function eliminarDefinitivo(itemId) {
  if (!await confirmar('¿Eliminar definitivamente? Esta acción NO se puede deshacer.', { textoConfirmar: 'Eliminar definitivamente', tipo: 'danger' })) return;
  S.papelera = S.papelera.filter(x => x.id !== itemId);
  saveState();
  renderModulo();
  toast('Eliminado definitivamente');
}

async function vaciarPapelera() {
  const count = (S.papelera || []).length;
  if (!count) return;
  if (!await confirmar(`¿Vaciar la papelera? Se eliminarán ${count} ${count === 1 ? 'elemento' : 'elementos'} de forma definitiva. Esta acción NO se puede deshacer.`, { textoConfirmar: 'Vaciar', tipo: 'danger' })) return;
  S.papelera = [];
  saveState();
  renderModulo();
  toast('Papelera vaciada');
}

boot();

</script>
</body>
</html>
