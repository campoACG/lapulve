// MÓDULO: CHEQUES
// ════════════════════════════════════════════════════════════════════

let filtroCheques = { busqueda: '', tipo: '', estado: '' };

function renderCheques() {
  const q = (filtroCheques.busqueda || '').toLowerCase().trim();
  let lista = (S.cheques || []).slice();
  if (q) {
    lista = lista.filter(c =>
      (c.emisor || '').toLowerCase().includes(q) ||
      String(c.numero || '').toLowerCase().includes(q) ||
      (c.banco || '').toLowerCase().includes(q) ||
      (c.destino || '').toLowerCase().includes(q));
  }
  if (filtroCheques.tipo) lista = lista.filter(c => c.tipo === filtroCheques.tipo);
  if (filtroCheques.estado) lista = lista.filter(c => c.estado === filtroCheques.estado);
  // Ordenar por fechaPago desc
  lista.sort((a, b) => String(b.fechaPago || '').localeCompare(String(a.fechaPago || '')));

  // Totales por estado
  const todos = S.cheques || [];
  const sumByEstado = e => todos.filter(c => c.estado === e).reduce((a, c) => a + (Number(c.monto) || 0), 0);
  const totalAceptados = sumByEstado('aceptado');
  const totalDepositados = sumByEstado('depositado');
  const totalEndosados = sumByEstado('endosado');

  const estadoBadge = (e) => {
    const map = {
      depositado: { cls: 'badge-ok', lbl: 'Depositado' },
      aceptado:   { cls: 'badge-muted', lbl: 'Aceptado' },
      endosado:   { cls: 'badge-warn', lbl: 'Endosado' },
      rechazado:  { cls: 'badge-rust', lbl: 'Rechazado' },
    };
    const x = map[e] || { cls: 'badge-muted', lbl: e || '—' };
    return `<span class="badge ${x.cls}">${x.lbl}</span>`;
  };

  const rows = lista.map(c => {
    const cli = S.clientes.find(x => x.id === c.endosanteId);
    return `
      <tr>
        <td>
          <div style="font-weight:600">${esc(c.emisor || '—')}</div>

function nuevoCheque() {
  showModal('Nuevo cheque', formCheque({}) + `

      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCheque()">Guardar</button>
    </div>
  `);
}

function editarCheque(id) {
  const c = (S.cheques || []).find(x => x.id === id);
  if (!c) return;
  showModal('Editar cheque', formCheque(c) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCheque('${c.id}')">Guardar</button>
    </div>
  `);
}

function guardarCheque(id) {
  const datos = {
    tipo: document.getElementById('ch-tipo').value,
    estado: document.getElementById('ch-estado').value,
    endosanteId: document.getElementById('ch-endosante').value,
    emisor: document.getElementById('ch-emisor').value.trim(),
    banco: document.getElementById('ch-banco').value.trim(),
    numero: document.getElementById('ch-numero').value.trim(),
    monto: parseFloat(document.getElementById('ch-monto').value) || 0,
    fechaPago: document.getElementById('ch-fechapago').value,
    destino: document.getElementById('ch-destino').value.trim(),
  };
  if (!datos.emisor) return toast('Ingresá el emisor', 'warn');
  if (!datos.numero) return toast('Ingresá el N°', 'warn');
  if (!datos.monto) return toast('Ingresá el monto', 'warn');
  if (id) {
    const existing = S.cheques.find(x => x.id === id);
    S.cheques = S.cheques.map(x => x.id === id ? { ...existing, ...datos } : x);
  } else {
    datos.id = 'chq_' + Date.now() + '_' + uid().slice(0, 4);
    S.cheques = [...(S.cheques || []), datos];
  }
  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Cheque actualizado ✓' : 'Cheque registrado ✓');
}

async function eliminarCheque(id) {
  const c = S.cheques.find(x => x.id === id);
  if (!c) return;
  if (!await confirmar(`¿Eliminar el cheque N° ${c.numero} de ${c.emisor} (${fmtMoney(c.monto)})?`, { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;
  moverAPapelera('cheque', c);
  S.cheques = S.cheques.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Cheque eliminado');
}

function renderMaquina() {
  const cuotas = (S.cuotasMaquina || []).slice().sort((a, b) => Number(a.numero) - Number(b.numero));

  const cards = cuotas.map(c => {
    const esPagada = c.estado === 'pagada';
    const venc = String(c.vencimiento || '');
    const venceProx = !esPagada && venc && (new Date(venc) - new Date()) / 86400000 < 30;
    const usdActualARS = (Number(c.totalUSD) || 0) * tc;

    return `
      <div class="card" style="position:relative;${esPagada ? 'opacity:.75;background:var(--bg-soft)' : ''}${venceProx ? 'border:2px solid var(--rust)' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">

            <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em">Vence ${fechaCorta(c.vencimiento)}</div>
          </div>
          ${esPagada
            ? '<span class="badge badge-ok">✓ Pagada</span>'
            : venceProx ? '<span class="badge badge-rust">Próxima a vencer</span>'
            : '<span class="badge badge-warn">Pendiente</span>'}
        </div>

        <div style="background:var(--dark);color:var(--on-dark);border-radius:10px;padding:14px;margin-bottom:12px">
          <div style="font-size:11px;color:var(--on-dark-2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Total cuota</div>
          <div class="mono" style="font-size:26px;font-weight:700;color:var(--gold-soft)">${fmtUSD(c.totalUSD)}</div>
          <div style="font-size:12px;color:var(--on-dark-2);margin-top:4px">Capital ${fmtUSD(c.capitalUSD)} · Financiación ${fmtUSD(c.financUSD)}</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;font-size:12px">
          <div>
            <div style="color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:.08em">Equivalente al TC actual</div>
            <div class="mono" style="font-weight:700">${fmtMoney(usdActualARS)}</div>
            <div style="font-size:10px;color:var(--ink-3)">TC $ ${fmt(tc, 2)}</div>
          </div>
          <div>
            <div style="color:var(--ink-3);font-size:10px;text-transform:uppercase;letter-spacing:.08em">Monto pagado en $</div>
            <div class="mono" style="font-weight:700;color:${Number(c.totalARS) > 0 ? 'var(--accent)' : 'var(--ink-3)'}">${Number(c.totalARS) > 0 ? fmtMoney(c.totalARS) : '—'}</div>
          </div>
        </div>

        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${!esPagada ? `<button class="btn btn-sm btn-primary" onclick="marcarCuotaPagada('${c.id}')">✓ Marcar pagada</button>` : `<button class="btn btn-sm btn-ghost" onclick="marcarCuotaPendiente('${c.id}')">Volver a pendiente</button>`}

        </div>
      </div>

  return `

        <div class="stat-value">${fmtUSD(totalUSD)}</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-label">Pagado</div>
        <div class="stat-value" style="color:var(--ok)">${fmtUSD(pagadasUSD)}</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Pendiente</div>
        <div class="stat-value" style="color:var(--rust)">${fmtUSD(pendientesUSD)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Equivalente $</div>
        <div class="stat-value">${fmtMoney(pendientesUSD * tc)}</div>
        <div class="stat-sub">TC actual $ ${fmt(tc, 2)}</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

  showModal('Editar cuota', formCuotaMaquina(c) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>

function guardarCuotaMaquina(id) {
  const datos = {
    numero: parseInt(document.getElementById('cu-numero').value) || 0,

function confirmarMarcarCuotaPagada(id) {

async function eliminarCuotaMaquina(id) {

// MÓDULO: GASTOS
// ════════════════════════════════════════════════════════════════════

let filtroGastos = { busqueda: '', categoria: '', conFactura: '', desde: '', hasta: '' };

function renderGastos() {
  let lista = (S.gastos || []).slice();
  const q = (filtroGastos.busqueda || '').toLowerCase().trim();
  if (q) {
    lista = lista.filter(g => {
      const prov = S.proveedores.find(p => p.id === g.proveedorId);
      return (prov && prov.razonSocial.toLowerCase().includes(q)) ||
             (g.concepto || '').toLowerCase().includes(q) ||
             (g.numFactura || '').toLowerCase().includes(q);
    });
  }
  if (filtroGastos.categoria) lista = lista.filter(g => g.categoria === filtroGastos.categoria);
  if (filtroGastos.conFactura === 'si') lista = lista.filter(g => g.conFactura === true || g.conFactura === 'TRUE' || g.conFactura === 'true');
  if (filtroGastos.conFactura === 'no') lista = lista.filter(g => !(g.conFactura === true || g.conFactura === 'TRUE' || g.conFactura === 'true'));
  if (filtroGastos.desde) lista = lista.filter(g => String(g.fecha || '') >= filtroGastos.desde);
  if (filtroGastos.hasta) lista = lista.filter(g => String(g.fecha || '') <= filtroGastos.hasta);
  lista.sort((a, b) => String(b.fecha || '').localeCompare(String(a.fecha || '')));

  // Totales
  const totalNeto = lista.reduce((a, g) => a + (Number(g.neto) || 0), 0);
  const totalIVA = lista.reduce((a, g) => a + (Number(g.iva) || 0), 0);
  const totalGeneral = lista.reduce((a, g) => a + (Number(g.total) || 0), 0);
  const conFactura = lista.filter(g => g.conFactura === true || g.conFactura === 'TRUE' || g.conFactura === 'true').length;

  const cats = Array.isArray((S.config || {}).categoriasGasto) ? S.config.categoriasGasto : [];

  const rows = lista.map(g => {
    const prov = S.proveedores.find(p => p.id === g.proveedorId);

    return `

        <div class="stat-value">${fmtMoney(totalGeneral)}</div>

      </div>
      <div class="stat-card accent">
        <div class="stat-label">Neto</div>
        <div class="stat-value">${fmtMoney(totalNeto)}</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">IVA crédito</div>
        <div class="stat-value">${fmtMoney(totalIVA)}</div>
        <div class="stat-sub">${conFactura} con factura</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px">
        <div class="field" style="margin:0">
          <label>Buscar</label>
          <input placeholder="Proveedor, concepto, N° factura..." value="${esc(filtroGastos.busqueda)}"
            oninput="filtroGastos.busqueda=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Categoría</label>
          <select onchange="filtroGastos.categoria=this.value;renderModulo()">
            <option value="">Todas</option>
            ${cats.map(c => `<option value="${esc(c)}"${filtroGastos.categoria === c ? ' selected' : ''}>${esc(c)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Factura</label>
          <select onchange="filtroGastos.conFactura=this.value;renderModulo()">
            <option value="">Todas</option>
            <option value="si"${filtroGastos.conFactura === 'si' ? ' selected' : ''}>Con factura</option>
            <option value="no"${filtroGastos.conFactura === 'no' ? ' selected' : ''}>Sin factura</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Desde</label>
          <input type="date" value="${esc(filtroGastos.desde)}" onchange="filtroGastos.desde=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Hasta</label>
          <input type="date" value="${esc(filtroGastos.hasta)}" onchange="filtroGastos.hasta=this.value;renderModulo()">

    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="nuevoGasto()">+ Gasto</button>

}

function formGasto(g) {
  g = g || { fecha: hoy(), conFactura: true };
  const cats = Array.isArray((S.config || {}).categoriasGasto) ? S.config.categoriasGasto : [];
  const provOpts = (S.proveedores || []).slice()
    .sort((a, b) => a.razonSocial.localeCompare(b.razonSocial))
    .map(p => `<option value="${p.id}"${g.proveedorId === p.id ? ' selected' : ''}>${esc(p.razonSocial)}</option>`).join('');
  const allCats = (g.categoria && cats.indexOf(g.categoria) < 0) ? [g.categoria, ...cats] : cats;
  const tieneFact = g.conFactura === true || g.conFactura === 'TRUE' || g.conFactura === 'true' || g.id === undefined;

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Fecha</label>
        <input id="g-fecha" type="date" value="${esc(g.fecha || hoy())}"></div>
      <div class="field"><label>Proveedor</label>
        <select id="g-prov">
          <option value="">— Seleccionar —</option>
          ${provOpts}
        </select>
      </div>
    </div>

    <div class="field"><label>Concepto / Detalle</label>
      <input id="g-concepto" value="${esc(g.concepto || '')}" placeholder="Ej: Combustible para equipo Caimán"></div>

    <div class="field"><label>Categoría</label>
      <select id="g-cat">
        <option value="">— Sin categoría —</option>
        ${allCats.map(c => `<option value="${esc(c)}"${c === g.categoria ? ' selected' : ''}>${esc(c)}</option>`).join('')}
      </select>
    </div>

    <div style="background:var(--bg-soft);border-radius:10px;padding:14px;margin-bottom:14px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px">
        <input type="checkbox" id="g-conFact" ${tieneFact ? 'checked' : ''} style="width:auto;margin:0" onchange="toggleGastoFactura()">
        <span style="font-weight:600">Con factura (computa IVA crédito)</span>
      </label>
      <div id="g-fact-num-wrap" style="display:${tieneFact ? 'block' : 'none'};margin-bottom:10px">
        <div class="field" style="margin:0"><label>N° de factura</label>
          <input id="g-numFact" value="${esc(g.numFactura || '')}" placeholder="0001-00001234"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div class="field" style="margin:0"><label>Neto ($)</label>
          <input id="g-neto" type="number" step="0.01" value="${g.neto === 0 ? '0' : (g.neto || '')}" oninput="recalcularGasto()"></div>
        <div class="field" style="margin:0" id="g-iva-wrap" style="display:${tieneFact ? 'block' : 'none'}"><label>IVA ($)</label>
          <input id="g-iva" type="number" step="0.01" value="${g.iva || ''}" oninput="recalcularGasto()"></div>
        <div class="field" style="margin:0"><label>Total ($)</label>
          <input id="g-total" type="number" step="0.01" value="${g.total || ''}" oninput="recalcularGastoTotal()"></div>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm btn-ghost" onclick="autocalcularIVA(10.5)">IVA 10,5% sobre Neto</button>
        <button class="btn btn-sm btn-ghost" onclick="autocalcularIVA(21)">IVA 21% sobre Neto</button>
      </div>
      <div style="font-size:11px;color:var(--ink-3);margin-top:8px;line-height:1.5">
        💡 Para un gasto que es <b>solo IVA</b> (nota de crédito fiscal, percepción, etc.): poné el Neto en <b>0</b> y cargá el monto en IVA. Ese importe sumará al IVA crédito pero no a los gastos.
      </div>
    </div>
  `;
}

function toggleGastoFactura() {
  const on = document.getElementById('g-conFact').checked;
  document.getElementById('g-fact-num-wrap').style.display = on ? 'block' : 'none';
  if (!on) {
    document.getElementById('g-iva').value = '';
    recalcularGastoTotal();
  }
}

function recalcularGasto() {
  const neto = parseFloat(document.getElementById('g-neto').value) || 0;
  const iva = parseFloat(document.getElementById('g-iva').value) || 0;
  document.getElementById('g-total').value = (neto + iva).toFixed(2);
}

function recalcularGastoTotal() {
  // Si el usuario edita el total directamente, no hago nada con neto/iva
}

function autocalcularIVA(alic) {
  alic = alic || 10.5;
  const neto = parseFloat(document.getElementById('g-neto').value) || 0;
  if (!neto) return toast('Ingresá primero el neto', 'warn');
  const iva = neto * alic / 100;
  document.getElementById('g-iva').value = iva.toFixed(2);
  recalcularGasto();
}

function nuevoGasto() {
  showModal('Nuevo gasto', formGasto({}) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarGasto()">Guardar</button>
    </div>
  `);
}

function editarGasto(id) {
  const g = (S.gastos || []).find(x => x.id === id);
  if (!g) return;
  showModal('Editar gasto', formGasto(g) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarGasto('${g.id}')">Guardar</button>
    </div>
  `);
}

function guardarGasto(id) {
  const netoVal = document.getElementById('g-neto').value;
  const datos = {
    fecha: document.getElementById('g-fecha').value,
    proveedorId: document.getElementById('g-prov').value,
    concepto: document.getElementById('g-concepto').value.trim(),
    categoria: document.getElementById('g-cat').value,
    conFactura: document.getElementById('g-conFact').checked,
    numFactura: document.getElementById('g-numFact').value.trim(),
    neto: parseFloat(netoVal) || 0,
    iva: parseFloat(document.getElementById('g-iva').value) || 0,
    total: parseFloat(document.getElementById('g-total').value) || 0,
  };
  if (!datos.fecha) return toast('Ingresá la fecha', 'warn');
  // Permitimos neto=0 si hay IVA (gasto solo-impositivo). Pero algo tiene que haber.
  if (!datos.neto && !datos.iva && !datos.total) return toast('Ingresá un monto (neto o IVA)', 'warn');
  if (!datos.total) datos.total = datos.neto + datos.iva;

  if (id) {
    const existing = S.gastos.find(x => x.id === id);
    S.gastos = S.gastos.map(x => x.id === id ? { ...existing, ...datos } : x);
  } else {
    datos.id = 'gas_' + Date.now() + '_' + uid().slice(0, 4);
    S.gastos = [...(S.gastos || []), datos];
  }
  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Gasto actualizado ✓' : 'Gasto registrado ✓');
}

async function eliminarGasto(id) {
  const g = S.gastos.find(x => x.id === id);
  if (!g) return;
  const prov = S.proveedores.find(p => p.id === g.proveedorId);
  if (!await confirmar(`¿Eliminar gasto de ${prov ? prov.razonSocial : '(sin proveedor)'} por ${fmtMoney(g.total)}?`, { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;
  moverAPapelera('gasto', g);
  S.gastos = S.gastos.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Gasto eliminado');
}
// ════════════════════════════════════════════════════════════════════
// MÓDULO: INGRESOS (TRABAJOS) — con detalle de días/lotes acumulados
// ════════════════════════════════════════════════════════════════════

let filtroIngresos = { busqueda: '', cliente: '', facturado: '', desde: '', hasta: '' };
let ingresoDiasTmp = []; // estado temporal del detalle de días en el modal

function renderIngresos() {
  let lista = (S.trabajos || []).slice();
  const q = (filtroIngresos.busqueda || '').toLowerCase().trim();
  if (q) {
    lista = lista.filter(t => {
      const cli = S.clientes.find(c => c.id === t.clienteId);
      return (cli && cli.razonSocial.toLowerCase().includes(q)) ||
             (t.observaciones || '').toLowerCase().includes(q);
    });
  }
  if (filtroIngresos.cliente === '__NONE__') {
    lista = lista.filter(t => !t.clienteId);
  } else if (filtroIngresos.cliente) {
    lista = lista.filter(t => t.clienteId === filtroIngresos.cliente);
  }
  if (filtroIngresos.facturado === 'pendiente') lista = lista.filter(t => estadoIngreso(t) === 'pendiente');
  if (filtroIngresos.facturado === 'parcial')   lista = lista.filter(t => estadoIngreso(t) === 'parcial');
  if (filtroIngresos.facturado === 'completo')  lista = lista.filter(t => estadoIngreso(t) === 'completo');
  if (filtroIngresos.desde) lista = lista.filter(t => String(t.fecha || '') >= filtroIngresos.desde);
  if (filtroIngresos.hasta) lista = lista.filter(t => String(t.fecha || '') <= filtroIngresos.hasta);
  lista.sort((a, b) => String(b.fecha || '').localeCompare(String(a.fecha || '')));

  // Totales del pool
  const totalHas = lista.reduce((a, t) => a + (Number(t.has) || 0), 0);
  // Hectáreas facturadas REALES: suma de has de todas las facturas no anuladas
  const hasFacturadas = (S.facturas || [])
    .filter(f => f.estado !== 'anulada')
    .reduce((a, f) => a + (Number(f.has) || 0), 0);
  const hasPendientes = totalHas - hasFacturadas;
  const montoTotal = lista.reduce((a, t) => a + (Number(t.monto) || 0), 0);
  // Monto pendiente: las has pendientes valuadas al precio/ha promedio de los ingresos
  const phaPromedio = totalHas > 0 ? montoTotal / totalHas : 0;
  const montoPendiente = hasPendientes > 0 ? hasPendientes * phaPromedio : 0;

  const rows = lista.map(t => {
    const cli = S.clientes.find(c => c.id === t.clienteId);
    const dias = Array.isArray(t.dias) ? t.dias.length : 0;
    const hasTot = Number(t.has) || 0;
    const hasFact = Number(t.hasFacturadas) || 0;
    const hasPend = hasTot - hasFact;
    const monto = Number(t.monto) || 0;
    const pha = hasTot > 0 ? monto / hasTot : 0;
    const estado = estadoIngreso(t);
    const estadoBadge = estado === 'pendiente'
      ? '<span class="badge badge-warn">Pendiente</span>'
      : estado === 'parcial'
      ? `<span class="badge badge-rust">Parcial</span>`
      : '<span class="badge badge-ok">Facturado</span>';

    return `
      <tr>
        <td>${fechaCorta(t.fecha)}</td>
        <td>
          <div style="font-weight:600">${cli ? esc(cli.razonSocial) : '<span style="color:var(--gold);font-style:italic">— Pool libre —</span>'}</div>
          ${dias > 0 ? `<div style="font-size:11px;color:var(--ink-3)">${dias} día${dias === 1 ? '' : 's'}</div>` : ''}
          ${t.observaciones ? `<div style="font-size:11px;color:var(--ink-3);font-style:italic">${esc(t.observaciones)}</div>` : ''}
        </td>
        <td style="text-align:right">
          <div class="mono" style="font-weight:600">${fmt(hasTot, 2)} ha</div>
          ${estado !== 'pendiente' ? `<div style="font-size:10px;color:var(--ink-3)" class="mono">${fmt(hasFact, 2)} fact · ${fmt(hasPend, 2)} pend</div>` : ''}
        </td>
        <td style="text-align:right" class="mono">${fmtMoney(monto)}</td>
        <td style="text-align:right" class="mono" style="color:var(--ink-3);font-size:12px">${pha > 0 ? fmtMoney(pha) : '—'}</td>
        <td>${estadoBadge}</td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-sm btn-secondary" onclick="editarIngreso('${t.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="eliminarIngreso('${t.id}')" style="margin-left:4px">🗑</button>
        </td>
      </tr>`;
  }).join('');

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px">
      <div class="stat-card accent">
        <div class="stat-label">Total ingresos</div>
        <div class="stat-value">${fmtMoney(montoTotal)}</div>
        <div class="stat-sub">${lista.length} trabajo${lista.length === 1 ? '' : 's'}</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Pendiente de facturar</div>
        <div class="stat-value">${fmtMoney(montoPendiente)}</div>
        <div class="stat-sub">${fmt(hasPendientes, 2)} ha</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Hectáreas totales</div>
        <div class="stat-value">${fmt(totalHas, 2)} ha</div>
        <div class="stat-sub">${fmt(hasFacturadas, 2)} ya facturadas</div>
      </div>
      <div class="stat-card rust">
        <div class="stat-label">Promedio $/ha</div>
        <div class="stat-value">${totalHas > 0 ? fmtMoney(montoTotal / totalHas) : '—'}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px">
        <div class="field" style="margin:0">
          <label>Buscar</label>
          <input placeholder="Cliente, observaciones..." value="${esc(filtroIngresos.busqueda)}"
            oninput="filtroIngresos.busqueda=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Cliente</label>
          <select onchange="filtroIngresos.cliente=this.value;renderModulo()">
            <option value="">Todos</option>
            <option value="__NONE__"${filtroIngresos.cliente === '__NONE__' ? ' selected' : ''}>— Pool libre —</option>
            ${(S.clientes || []).map(c => `<option value="${c.id}"${filtroIngresos.cliente === c.id ? ' selected' : ''}>${esc(c.razonSocial)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Estado</label>
          <select onchange="filtroIngresos.facturado=this.value;renderModulo()">
            <option value="">Todos</option>
            <option value="pendiente"${filtroIngresos.facturado === 'pendiente' ? ' selected' : ''}>Pendiente</option>
            <option value="parcial"${filtroIngresos.facturado === 'parcial' ? ' selected' : ''}>Parcial</option>
            <option value="completo"${filtroIngresos.facturado === 'completo' ? ' selected' : ''}>Facturado</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Desde</label>
          <input type="date" value="${esc(filtroIngresos.desde)}" onchange="filtroIngresos.desde=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Hasta</label>
          <input type="date" value="${esc(filtroIngresos.hasta)}" onchange="filtroIngresos.hasta=this.value;renderModulo()">
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="nuevoIngreso()">+ Ingreso</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Cliente</th>
            <th style="text-align:right">Hectáreas</th>
            <th style="text-align:right">Monto</th>
            <th style="text-align:right">$/ha prom.</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--ink-3);padding:40px">Sin ingresos que coincidan</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

// Estado de un ingreso según hectáreas facturadas
function estadoIngreso(t) {
  const hasTot = Number(t.has) || 0;
  const hasFact = Number(t.hasFacturadas) || 0;
  if (hasFact <= 0) return 'pendiente';
  if (hasFact >= hasTot - 0.0001) return 'completo';
  return 'parcial';
}

function formIngreso(t) {
  t = t || { fecha: hoy(), dias: [] };
  const cliOpts = (S.clientes || []).map(c =>
    `<option value="${c.id}"${t.clienteId === c.id ? ' selected' : ''}>${esc(c.razonSocial)}</option>`
  ).join('');

  // Inicializar el estado temporal de días
  ingresoDiasTmp = Array.isArray(t.dias) ? JSON.parse(JSON.stringify(t.dias)) : [];

  // Hectáreas ya facturadas (no se pueden bajar de ese valor al editar)
  const hasFact = Number(t.hasFacturadas) || 0;
  const editandoConFact = t.id && hasFact > 0;

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Fecha del ingreso</label>
        <input id="ing-fecha" type="date" value="${esc(t.fecha || hoy())}"></div>
      <div class="field"><label>Cliente <span style="color:var(--ink-3);font-weight:400;text-transform:none;font-size:10px">(opcional)</span></label>
        <select id="ing-cliente">
          <option value="">— Ninguno (pool libre) —</option>
          ${cliOpts}
        </select>

function renderDiasIngreso() {
  const cont = document.getElementById('ing-dias-list');
  if (!cont) return;
  if (ingresoDiasTmp.length === 0) {
    cont.innerHTML = '<div style="text-align:center;color:var(--ink-3);padding:14px;font-size:13px;font-style:italic">Sin días cargados</div>';
    return;
  }
  cont.innerHTML = ingresoDiasTmp.map((d, i) => `
    <div style="display:grid;grid-template-columns:1.2fr 1fr 1.5fr auto;gap:6px;align-items:center;margin-bottom:6px;padding:8px;background:#fff;border-radius:8px;border:1px solid var(--border)">
      <input type="date" value="${esc(d.fecha || '')}" oninput="actualizarDiaIngreso(${i},'fecha',this.value)" style="padding:6px 10px;font-size:13px">
      <input type="number" step="0.01" placeholder="Has" value="${d.has || ''}" oninput="actualizarDiaIngreso(${i},'has',this.value);sumarHasDeDias()" style="padding:6px 10px;font-size:13px">
      <input placeholder="Lote / detalle" value="${esc(d.detalle || '')}" oninput="actualizarDiaIngreso(${i},'detalle',this.value)" style="padding:6px 10px;font-size:13px">
      <button class="btn btn-sm btn-danger" onclick="quitarDiaIngreso(${i})">✕</button>
    </div>
  `).join('');
}

function agregarDiaIngreso() {
  ingresoDiasTmp.push({ fecha: hoy(), has: '', detalle: '' });
  renderDiasIngreso();
}

function quitarDiaIngreso(idx) {
  ingresoDiasTmp.splice(idx, 1);
  renderDiasIngreso();
  sumarHasDeDias();
}

function actualizarDiaIngreso(idx, campo, valor) {
  if (ingresoDiasTmp[idx]) ingresoDiasTmp[idx][campo] = valor;
}

function sumarHasDeDias() {
  const total = ingresoDiasTmp.reduce((a, d) => a + (parseFloat(d.has) || 0), 0);
  if (total > 0) {
    document.getElementById('ing-has').value = total.toFixed(2);
    recalcularIngreso();
  }
}

function recalcularIngreso() {
  const has = parseFloat(document.getElementById('ing-has').value) || 0;
  const monto = parseFloat(document.getElementById('ing-monto').value) || 0;
  const pha = has > 0 ? monto / has : 0;

  document.getElementById('ing-has-prev').textContent = fmt(has, 2) + ' ha';
  document.getElementById('ing-monto-prev').textContent = fmtMoney(monto);
  document.getElementById('ing-pha-prev').textContent = pha > 0 ? fmtMoney(pha) : '—';
}

function actualizarRetencionesPreview() {
  recalcularIngreso();
}

function nuevoIngreso() {
  showModal('Nuevo ingreso (trabajo)', formIngreso({}) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarIngreso()">Guardar</button>
    </div>
  `);
  setTimeout(() => { renderDiasIngreso(); recalcularIngreso(); }, 50);
}

function editarIngreso(id) {
  const t = (S.trabajos || []).find(x => x.id === id);
  if (!t) return;
  showModal('Editar ingreso', formIngreso(t) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarIngreso('${t.id}')">Guardar</button>
    </div>
  `);
  setTimeout(() => { renderDiasIngreso(); recalcularIngreso(); }, 50);
}

function guardarIngreso(id) {
  const fecha = document.getElementById('ing-fecha').value;
  const clienteId = document.getElementById('ing-cliente').value; // puede ser '' (pool libre)
  const operarioId = document.getElementById('ing-operario').value; // puede ser '' (ninguno)
  const has = parseFloat(document.getElementById('ing-has').value) || 0;
  const monto = parseFloat(document.getElementById('ing-monto').value) || 0;
  const observaciones = document.getElementById('ing-obs').value.trim();
  if (!fecha) return toast('Ingresá la fecha', 'warn');
  if (!has || has <= 0) return toast('Ingresá las hectáreas', 'warn');
  if (!monto || monto <= 0) return toast('Ingresá el monto', 'warn');

  // Si estamos editando y ya hay hectáreas facturadas, no se puede bajar de eso
  if (id) {
    const existing = S.trabajos.find(x => x.id === id);
    const hasFact = Number(existing && existing.hasFacturadas) || 0;
    if (hasFact > 0 && has < hasFact) {
      return toast(`No podés bajar las hectáreas a menos de ${fmt(hasFact, 2)} (ya facturadas)`, 'danger');
    }
  }

  const diasValidos = ingresoDiasTmp.filter(d => d.fecha || d.has || d.detalle);

  // Precio/ha del trabajo (congelado): lo derivamos del monto / has
  const precioHa = has > 0 ? monto / has : 0;

  const datos = {
    fecha, clienteId, operarioId,
    has, monto, precioHa,
    observaciones,
    dias: diasValidos,
  };

  if (id) {
    const existing = S.trabajos.find(x => x.id === id);
    // Preservamos hasFacturadas, facturaIds y el % de comisión ya congelado.
    // Si el trabajo viejo no tenía % congelado, lo congelamos ahora con el del operario actual.
    let pctCongelado = existing.comisionPctAplicada;
    if (pctCongelado === undefined || pctCongelado === null || pctCongelado === '') {
      const op = (S.operarios || []).find(o => o.id === operarioId);
      pctCongelado = op ? (Number(op.comisionPct) || 0) : 0;
    }
    S.trabajos = S.trabajos.map(x => x.id === id ? {
      ...existing, ...datos,
      hasFacturadas: existing.hasFacturadas || 0,
      facturaIds: existing.facturaIds || [],
      comisionPctAplicada: pctCongelado,
    } : x);
  } else {
    datos.id = 'trb_' + Date.now() + '_' + uid().slice(0, 4);
    datos.hasFacturadas = 0;
    datos.facturaIds = [];
    // Congelamos el % de comisión del operario en este momento
    const op = (S.operarios || []).find(o => o.id === operarioId);
    datos.comisionPctAplicada = op ? (Number(op.comisionPct) || 0) : 0;
    S.trabajos = [...(S.trabajos || []), datos];
  }
  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Ingreso actualizado ✓' : 'Ingreso registrado ✓');
}

async function eliminarIngreso(id) {
  const t = S.trabajos.find(x => x.id === id);
  if (!t) return;
  const cli = S.clientes.find(c => c.id === t.clienteId);
  const hasFact = Number(t.hasFacturadas) || 0;
  if (hasFact > 0) {
    return toast('No se puede eliminar: tiene ' + fmt(hasFact, 2) + ' ha facturadas. Anulá la factura asociada primero.', 'danger');
  }
  const nombre = cli ? cli.razonSocial : 'Pool libre';
  if (!await confirmar(`¿Eliminar ingreso de ${nombre} (${fmt(t.has, 2)} ha · ${fmtMoney(t.monto)})?`, { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;
  moverAPapelera('ingreso', t);
  S.trabajos = S.trabajos.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Ingreso eliminado');
}

let filtroFacturas = { busqueda: '', cliente: '', estado: '', desde: '', hasta: '' };

function renderFacturacion() {
  let lista = (S.facturas || []).slice();
  const q = (filtroFacturas.busqueda || '').toLowerCase().trim();
  if (q) {
    lista = lista.filter(f => {
      const cli = S.clientes.find(c => c.id === f.clienteId);
      return (cli && cli.razonSocial.toLowerCase().includes(q)) ||
             (f.numero || '').toLowerCase().includes(q);
    });
  }
  if (filtroFacturas.cliente) lista = lista.filter(f => f.clienteId === filtroFacturas.cliente);
  if (filtroFacturas.estado) lista = lista.filter(f => f.estado === filtroFacturas.estado);
  if (filtroFacturas.desde) lista = lista.filter(f => String(f.fecha || '') >= filtroFacturas.desde);
  if (filtroFacturas.hasta) lista = lista.filter(f => String(f.fecha || '') <= filtroFacturas.hasta);
  lista.sort((a, b) => String(b.fecha || '').localeCompare(String(a.fecha || '')));

  // Totales
  const totalNeto = lista.reduce((a, f) => a + (Number(f.neto) || 0), 0);
  const totalIVA = lista.reduce((a, f) => a + (Number(f.iva) || 0), 0);
  const totalGeneral = lista.reduce((a, f) => a + (Number(f.total) || 0), 0);
  const totalRet = lista.reduce((a, f) => a + (Number(f.retGanancias) || 0) + (Number(f.retIVA) || 0) + (Number(f.retIIBB) || 0), 0);

  const rows = lista.map(f => {
    const cli = S.clientes.find(c => c.id === f.clienteId);
    const rets = (Number(f.retGanancias) || 0) + (Number(f.retIVA) || 0) + (Number(f.retIIBB) || 0);
    const neto = (Number(f.total) || 0) - rets;
    return `
      <tr>
        <td>${fechaCorta(f.fecha)}</td>
        <td><span class="mono" style="font-weight:700">${esc(f.numero || '—')}</span></td>
        <td>
          <div style="font-weight:600">${esc(cli ? cli.razonSocial : '(sin cliente)')}</div>
        </td>
        <td style="text-align:right" class="mono">${fmtMoney(f.neto)}</td>
        <td style="text-align:right" class="mono">${fmtMoney(f.iva)}</td>
        <td style="text-align:right" class="mono" style="font-weight:700">${fmtMoney(f.total)}</td>
        <td style="text-align:right" class="mono" style="color:var(--rust)">${rets > 0 ? '− ' + fmt(rets, 2) : '—'}</td>
        <td style="text-align:right" class="mono" style="font-weight:700;color:var(--ok)">${fmtMoney(neto)}</td>
        <td>${estadoFacturaBadge(f.estado)}</td>
        <td style="text-align:right;white-space:nowrap">
          <button class="btn btn-sm btn-secondary" onclick="editarFactura('${f.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="eliminarFactura('${f.id}')" style="margin-left:4px">🗑</button>
        </td>
      </tr>`;
  }).join('');

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px">
      <div class="stat-card accent">
        <div class="stat-label">Facturado total</div>
        <div class="stat-value">${fmtMoney(totalGeneral)}</div>
        <div class="stat-sub">${lista.length} factura${lista.length === 1 ? '' : 's'}</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Neto</div>
        <div class="stat-value">${fmtMoney(totalNeto)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">IVA débito</div>
        <div class="stat-value">${fmtMoney(totalIVA)}</div>
      </div>
      <div class="stat-card rust">
        <div class="stat-label">Retenciones sufridas</div>
        <div class="stat-value">${fmtMoney(totalRet)}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px">
        <div class="field" style="margin:0">
          <label>Buscar</label>
          <input placeholder="Cliente o N° factura..." value="${esc(filtroFacturas.busqueda)}"
            oninput="filtroFacturas.busqueda=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Cliente</label>
          <select onchange="filtroFacturas.cliente=this.value;renderModulo()">
            <option value="">Todos</option>
            ${(S.clientes || []).map(c => `<option value="${c.id}"${filtroFacturas.cliente === c.id ? ' selected' : ''}>${esc(c.razonSocial)}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Estado</label>
          <select onchange="filtroFacturas.estado=this.value;renderModulo()">
            <option value="">Todos</option>
            <option value="emitida"${filtroFacturas.estado === 'emitida' ? ' selected' : ''}>Emitida</option>
            <option value="cobrada"${filtroFacturas.estado === 'cobrada' ? ' selected' : ''}>Cobrada</option>
            <option value="anulada"${filtroFacturas.estado === 'anulada' ? ' selected' : ''}>Anulada</option>
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Desde</label>
          <input type="date" value="${esc(filtroFacturas.desde)}" onchange="filtroFacturas.desde=this.value;renderModulo()">
        </div>
        <div class="field" style="margin:0">
          <label>Hasta</label>
          <input type="date" value="${esc(filtroFacturas.hasta)}" onchange="filtroFacturas.hasta=this.value;renderModulo()">
        </div>
      </div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
      <button class="btn btn-primary" onclick="nuevaFactura()">+ Factura</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>N°</th>
            <th>Cliente</th>
            <th style="text-align:right">Neto</th>
            <th style="text-align:right">IVA</th>
            <th style="text-align:right">Total</th>
            <th style="text-align:right">Retenciones</th>
            <th style="text-align:right">A cobrar</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="10" style="text-align:center;color:var(--ink-3);padding:40px">Sin facturas que coincidan</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

function estadoFacturaBadge(e) {
  const m = {
    emitida: { cls: 'badge-warn', lbl: 'Emitida' },
    cobrada: { cls: 'badge-ok', lbl: 'Cobrada' },
    anulada: { cls: 'badge-rust', lbl: 'Anulada' },
  };
  const x = m[e] || { cls: 'badge-muted', lbl: e || 'Sin estado' };
  return `<span class="badge ${x.cls}">${x.lbl}</span>`;
}

// Estado temporal del formulario de factura: detalle de qué hectáreas se toman de cada ingreso

  return `

          <input id="fac-retIVA" type="number" step="0.01" value="${f.retIVA || 0}"></div>
        <div class="field" style="margin:0"><label>IIBB ($)</label>
          <input id="fac-retIIBB" type="number" step="0.01" value="${f.retIIBB || 0}"></div>
      </div>
      <div id="fac-cobrar" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:13px"></div>
    </div>

    <div class="field"><label>Estado</label>
      <select id="fac-estado">
        <option value="emitida"${f.estado === 'emitida' ? ' selected' : ''}>Emitida</option>
        <option value="cobrada"${f.estado === 'cobrada' ? ' selected' : ''}>Cobrada</option>
        <option value="anulada"${f.estado === 'anulada' ? ' selected' : ''}>Anulada</option>
      </select>
    </div>
  `;
}

// Cuando cambia el cliente, autocompletamos FIFO con las has que ya tenga ingresadas
function onCambioClienteFactura() {
  // Por defecto, autocompletamos el tope total disponible para ese cliente + pool libre
  const cliId = document.getElementById('fac-cliente').value;
  if (!cliId) return;
  const cli = S.clientes.find(c => c.id === cliId);
  if (!cli) return;
  recalcularFactura();
}

// Cuando el usuario cambia las hectáreas, recalculamos FIFO si está vacío el detalle
function onCambiarHasFactura() {
  if (facTomas.length === 0) {
    autoFIFO();
  } else {
    // Si ya hay tomas manuales, no las pisamos: solo recalculamos totales
    renderTomasFactura();
    recalcularFactura();
  }
}

// Calcula automáticamente las tomas FIFO según las hectáreas pedidas
function autoFIFO() {
  const facturaIdEditando = document.getElementById('fac-cliente').dataset.editandoId || '';
  const hasPedidas = parseFloat(document.getElementById('fac-has').value) || 0;
  if (hasPedidas <= 0) {
    facTomas = [];
    renderTomasFactura();
    recalcularFactura();
    return;
  }
  const cliId = document.getElementById('fac-cliente').value;
  // Pool: ingresos con (cliente coincide O sin cliente), ordenados por fecha ascendente
  // Si estamos editando, también consideramos las has que YA tomaba esta factura como "disponibles" (porque las vamos a devolver y retomar)
  const facId = facturaIdEditando;
  const candidatos = (S.trabajos || [])
    .filter(t => !t.clienteId || t.clienteId === cliId)
    .map(t => {
      const facturadasOtras = (Number(t.hasFacturadas) || 0) - tomasYaUsadasPorFactura(t, facId);
      return {
        ingreso: t,
        disponibles: (Number(t.has) || 0) - facturadasOtras,
      };
    })
    .filter(x => x.disponibles > 0.0001)
    .sort((a, b) => String(a.ingreso.fecha).localeCompare(String(b.ingreso.fecha)));

  let restante = hasPedidas;
  const nuevas = [];
  for (const c of candidatos) {
    if (restante <= 0.0001) break;
    const tomar = Math.min(c.disponibles, restante);
    nuevas.push({ ingresoId: c.ingreso.id, has: Math.round(tomar * 100) / 100 });
    restante -= tomar;
  }
  facTomas = nuevas;
  renderTomasFactura();
  recalcularFactura();
  if (restante > 0.01) {
    toast('Solo se pudieron tomar ' + fmt(hasPedidas - restante, 2) + ' ha del pool. Faltan ' + fmt(restante, 2) + ' ha disponibles.', 'warn');
  }
}

// Cuánto de un ingreso ya está siendo usado por una factura específica (las tomas que VAMOS a reemplazar)
function tomasYaUsadasPorFactura(t, facId) {
  if (!facId) return 0;
  const f = (S.facturas || []).find(x => x.id === facId);
  if (!f || !Array.isArray(f.tomas)) return 0;
  let suma = 0;
  for (const tk of f.tomas) {
    if (tk.ingresoId === t.id) suma += Number(tk.has) || 0;
  }
  return suma;
}

function renderTomasFactura() {
  const cont = document.getElementById('fac-tomas-list');
  if (!cont) return;
  if (facTomas.length === 0) {
    cont.innerHTML = '<div style="text-align:center;color:var(--ink-3);padding:14px;font-size:13px;font-style:italic">Sin hectáreas tomadas. Ingresá las hectáreas arriba para autocompletar, o tocá "+ Tomar de otro ingreso".</div>';
    return;
  }
  cont.innerHTML = facTomas.map((tk, i) => {
    const t = S.trabajos.find(x => x.id === tk.ingresoId);
    if (!t) return '';
    const cli = S.clientes.find(c => c.id === t.clienteId);
    const fechaIng = fechaCorta(t.fecha);
    return `
      <div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;margin-bottom:6px;padding:8px;background:#fff;border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--ink-3)">${fechaIng}</div>
        <div style="font-size:12px;font-weight:600;min-width:0">
          ${cli ? esc(cli.razonSocial) : '<span style="color:var(--gold)">Pool libre</span>'}
          <div style="font-size:10px;color:var(--ink-3);font-weight:400">Total ${fmt(t.has, 2)} ha · Pend. ${fmt(hasPendienteEnIngreso(t, getEditandoId()), 2)} ha</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" step="0.01" value="${tk.has}" style="width:80px;padding:5px 8px;font-size:12px;text-align:right" oninput="actualizarTomaFactura(${i}, this.value)">
          <span style="font-size:11px;color:var(--ink-3)">ha</span>
        </div>
        <button class="btn btn-sm btn-danger" onclick="quitarTomaFactura(${i})">✕</button>
      </div>
    `;
  }).join('');
}

function hasPendienteEnIngreso(t, facIdActual) {
  const yaFact = Number(t.hasFacturadas) || 0;
  const usadasAhora = tomasYaUsadasPorFactura(t, facIdActual);
  return (Number(t.has) || 0) - yaFact + usadasAhora;
}

function getEditandoId() {
  const el = document.getElementById('fac-cliente');
  return (el && el.dataset.editandoId) || '';
}

function actualizarTomaFactura(idx, valor) {
  const v = parseFloat(valor) || 0;
  if (facTomas[idx]) {
    facTomas[idx].has = v;
    // Recalcular total de has
    const totalTomadas = facTomas.reduce((a, x) => a + (Number(x.has) || 0), 0);
    document.getElementById('fac-has').value = totalTomadas.toFixed(2);
    recalcularFactura();
  }
}

function quitarTomaFactura(idx) {
  facTomas.splice(idx, 1);
  const totalTomadas = facTomas.reduce((a, x) => a + (Number(x.has) || 0), 0);
  document.getElementById('fac-has').value = totalTomadas.toFixed(2);
  renderTomasFactura();
  recalcularFactura();
}

function elegirIngresoFactura() {
  const cliId = document.getElementById('fac-cliente').value;
  const facId = getEditandoId();
  if (!cliId) return toast('Seleccioná primero el cliente', 'warn');

  // Listar todos los ingresos disponibles (del cliente o del pool libre)
  const yaElegidos = new Set(facTomas.map(t => t.ingresoId));
  const candidatos = (S.trabajos || [])
    .filter(t => !yaElegidos.has(t.id) && (!t.clienteId || t.clienteId === cliId))
    .map(t => ({ t, disponible: hasPendienteEnIngreso(t, facId) }))
    .filter(x => x.disponible > 0.0001)
    .sort((a, b) => String(a.t.fecha).localeCompare(String(b.t.fecha)));

  if (candidatos.length === 0) {
    return toast('No hay más ingresos disponibles para este cliente', 'warn');
  }

  const opciones = candidatos.map(({ t, disponible }) => {
    const cli = S.clientes.find(c => c.id === t.clienteId);
    const tag = cli ? esc(cli.razonSocial) : '<span style="color:var(--gold)">Pool libre</span>';
    return `
      <div onclick="agregarTomaFactura('${t.id}', ${disponible})"
        style="padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:600">${fechaCorta(t.fecha)} · ${tag}</div>
            <div style="font-size:11px;color:var(--ink-3)">${esc(t.observaciones || '')}</div>
          </div>
          <div class="mono" style="font-weight:700;color:var(--accent)">${fmt(disponible, 2)} ha</div>
        </div>
      </div>
    `;
  }).join('');

  showModalSecundario('Elegí un ingreso', opciones);
}

function showModalSecundario(titulo, contenido) {
  const existing = document.getElementById('modal-secundario');
  if (existing) existing.remove();
  const o = document.createElement('div');
  o.className = 'modal-overlay';
  o.id = 'modal-secundario';
  o.style.zIndex = '1500';
  o.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">${esc(titulo)}</div>
        <div class="modal-close" onclick="cerrarModalSecundario()">✕</div>
      </div>
      <div>${contenido}</div>
    </div>`;
  document.body.appendChild(o);
}
function cerrarModalSecundario() {
  const m = document.getElementById('modal-secundario');
  if (m) m.remove();
}

function agregarTomaFactura(ingresoId, disponible) {
  // Pregunta cuántas has tomar (por defecto, todas las disponibles)
  cerrarModalSecundario();
  const t = S.trabajos.find(x => x.id === ingresoId);
  if (!t) return;
  showModalSecundario('¿Cuántas hectáreas?', `
    <div style="margin-bottom:14px;font-size:13px;color:var(--ink-2)">
      Hectáreas disponibles en este ingreso: <b class="mono">${fmt(disponible, 2)} ha</b>
    </div>
    <div class="field">
      <label>Hectáreas a tomar</label>
      <input id="tk-has" type="number" step="0.01" max="${disponible}" value="${disponible.toFixed(2)}">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="cerrarModalSecundario()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarTomaFactura('${ingresoId}', ${disponible})">Agregar</button>
    </div>
  `);
}

function confirmarTomaFactura(ingresoId, disponible) {
  const v = parseFloat(document.getElementById('tk-has').value) || 0;
  if (v <= 0) return toast('Ingresá un valor mayor a 0', 'warn');
  if (v > disponible + 0.0001) return toast('No podés tomar más de ' + fmt(disponible, 2) + ' ha', 'warn');
  facTomas.push({ ingresoId, has: Math.round(v * 100) / 100 });
  const totalTomadas = facTomas.reduce((a, x) => a + (Number(x.has) || 0), 0);
  document.getElementById('fac-has').value = totalTomadas.toFixed(2);
  cerrarModalSecundario();
  renderTomasFactura();
  recalcularFactura();
}

function recalcularFactura() {
  const has = parseFloat(document.getElementById('fac-has').value) || 0;
  const pha = parseFloat(document.getElementById('fac-pha').value) || 0;
  const neto = has * pha;
  const iva = neto * 0.105;
  const total = neto + iva;
  document.getElementById('fac-neto').value = neto.toFixed(2);
  document.getElementById('fac-iva').value = iva.toFixed(2);
  document.getElementById('fac-total').value = total.toFixed(2);
  document.getElementById('fac-neto-prev').textContent = fmtMoney(neto);
  document.getElementById('fac-iva-prev').textContent = fmtMoney(iva);
  document.getElementById('fac-total-prev').textContent = fmtMoney(total);

  // Calcular retenciones según cliente
  const cliId = document.getElementById('fac-cliente').value;
  const cli = S.clientes.find(c => c.id === cliId);
  if (cli) {
    const retGan = cli.agenteGanancias ? neto * (Number(cli.alicGanancias) || 0) / 100 : 0;
    const retIVA = cli.agenteIVA ? iva * (Number(cli.alicIVA) || 0) / 100 : 0;
    const retIIBB = cli.agenteIIBB ? neto * (Number(cli.alicIIBB) || 0) / 100 : 0;
    document.getElementById('fac-retGan').value = retGan.toFixed(2);
    document.getElementById('fac-retIVA').value = retIVA.toFixed(2);
    document.getElementById('fac-retIIBB').value = retIIBB.toFixed(2);
    const totalRet = retGan + retIVA + retIIBB;
    const aCobrar = total - totalRet;
    document.getElementById('fac-cobrar').innerHTML = totalRet > 0
      ? `<div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--ink-3)">Retenciones: <span class="mono">${fmtMoney(totalRet)}</span></span>
          <span style="font-weight:700">A cobrar: <span class="mono" style="color:var(--ok)">${fmtMoney(aCobrar)}</span></span>
        </div>`
      : '<div style="color:var(--ink-3);font-style:italic">Este cliente no tiene retenciones configuradas</div>';
  } else {
    document.getElementById('fac-cobrar').innerHTML = '<div style="color:var(--ink-3);font-style:italic">Seleccioná un cliente para ver retenciones</div>';
  }
}

function nuevaFactura() {
  if ((S.trabajos || []).length === 0) return toast('Cargá al menos un ingreso primero', 'warn');
  if ((S.clientes || []).length === 0) return toast('Cargá al menos un cliente primero', 'warn');
  showModal('Nueva factura', formFactura({}) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarFactura()">Guardar</button>
    </div>
  `);
  setTimeout(() => { renderTomasFactura(); recalcularFactura(); }, 50);
}

function editarFactura(id) {
  const f = (S.facturas || []).find(x => x.id === id);
  if (!f) return;
  showModal('Editar factura', formFactura(f) + `
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarFactura('${f.id}')">Guardar</button>
    </div>
  `);
  setTimeout(() => {
    // Marcar el id de la factura editada para que tomasYaUsadasPorFactura lo detecte
    const el = document.getElementById('fac-cliente');
    if (el) el.dataset.editandoId = id;
    renderTomasFactura();
    recalcularFactura();
  }, 50);
}

function guardarFactura(id) {
  const fecha = document.getElementById('fac-fecha').value;
  const numero = document.getElementById('fac-numero').value.trim();
  const clienteId = document.getElementById('fac-cliente').value;
  const has = parseFloat(document.getElementById('fac-has').value) || 0;
  const precioHa = parseFloat(document.getElementById('fac-pha').value) || 0;

  if (!fecha || !numero || !clienteId) return toast('Completá fecha, N° y cliente', 'warn');
  if (has <= 0) return toast('Las hectáreas deben ser mayores a 0', 'warn');
  if (precioHa <= 0) return toast('El precio por ha debe ser mayor a 0', 'warn');
  if (facTomas.length === 0) return toast('Asigná al menos un ingreso del pool', 'warn');

  // Validar que la suma de tomas coincide con has (con tolerancia de 0.01)
  const totalTomas = facTomas.reduce((a, t) => a + (Number(t.has) || 0), 0);
  if (Math.abs(totalTomas - has) > 0.01) {
    return toast(`Las hectáreas tomadas (${fmt(totalTomas, 2)}) no coinciden con el total facturado (${fmt(has, 2)})`, 'danger');
  }

  // Validar que ningún ingreso quede sobre-facturado
  for (const tk of facTomas) {
    const t = S.trabajos.find(x => x.id === tk.ingresoId);
    if (!t) return toast('Ingreso no encontrado', 'danger');
    const disponible = hasPendienteEnIngreso(t, id);
    if (Number(tk.has) > disponible + 0.0001) {
      return toast(`Demasiadas hectáreas para el ingreso del ${fechaCorta(t.fecha)}: pediste ${fmt(tk.has, 2)} pero solo hay ${fmt(disponible, 2)} disponibles`, 'danger');
    }
  }

  const neto = has * precioHa;
  const iva = neto * 0.105;
  const total = neto + iva;

  const datos = {
    fecha, numero, clienteId,
    has, precioHa, neto, iva, total,
    retGanancias: parseFloat(document.getElementById('fac-retGan').value) || 0,
    retIVA:       parseFloat(document.getElementById('fac-retIVA').value) || 0,
    retIIBB:      parseFloat(document.getElementById('fac-retIIBB').value) || 0,
    estado: document.getElementById('fac-estado').value,
    tomas: JSON.parse(JSON.stringify(facTomas)),
  };

  const facId = id || ('fac_' + Date.now() + '_' + uid().slice(0, 4));

  // Si editamos: primero devolvemos las hectáreas viejas a los ingresos
  if (id) {
    const existing = S.facturas.find(x => x.id === id);
    if (existing && Array.isArray(existing.tomas)) {
      for (const tk of existing.tomas) {
        S.trabajos = S.trabajos.map(t => t.id === tk.ingresoId
          ? { ...t, hasFacturadas: Math.max(0, (Number(t.hasFacturadas) || 0) - (Number(tk.has) || 0)), facturaIds: (t.facturaIds || []).filter(x => x !== id) }
          : t);
      }
    }
    S.facturas = S.facturas.map(x => x.id === id ? { ...existing, ...datos } : x);
  } else {
    datos.id = facId;
    S.facturas = [...(S.facturas || []), datos];
  }

  // Aplicar las nuevas tomas
  for (const tk of facTomas) {
    S.trabajos = S.trabajos.map(t => t.id === tk.ingresoId
      ? {
          ...t,
          hasFacturadas: (Number(t.hasFacturadas) || 0) + (Number(tk.has) || 0),
          facturaIds: Array.from(new Set([...(t.facturaIds || []), facId])),
        }
      : t);
  }

  saveState();
  closeModal();
  renderModulo();
  toast(id ? 'Factura actualizada ✓' : 'Factura creada ✓');
}

async function eliminarFactura(id) {
  const f = S.facturas.find(x => x.id === id);
  if (!f) return;
  if (!await confirmar(`¿Eliminar la factura ${f.numero}? Las hectáreas vinculadas vuelven al pool.`, { textoConfirmar: 'Eliminar', tipo: 'danger' })) return;

  // Devolver las hectáreas a los ingresos
  if (Array.isArray(f.tomas)) {
    for (const tk of f.tomas) {
      S.trabajos = S.trabajos.map(t => t.id === tk.ingresoId
        ? {
            ...t,
            hasFacturadas: Math.max(0, (Number(t.hasFacturadas) || 0) - (Number(tk.has) || 0)),
            facturaIds: (t.facturaIds || []).filter(x => x !== id),
          }
        : t);
    }
  }

  moverAPapelera('factura', f);
  S.facturas = S.facturas.filter(x => x.id !== id);
  saveState();
  renderModulo();
  toast('Factura eliminada');
}

function renderSocios() {
  const cfg = S.config || {};
  const tc = Number(cfg.tcActual || 1);
  const retiros = (S.retirosSocios || []).slice().sort((a, b) => String(b.fecha || '').localeCompare(String(a.fecha || '')));

  // Totales por socio

    { key: 'A', nombre: cfg.socioA || 'Socio A', pct: Number(cfg.pctA || 0) },
    { key: 'B', nombre: cfg.socioB || 'Socio B', pct: Number(cfg.pctB || 0) },
  ];
  const totalesPorSocio = {};
  socios.forEach(s => {
    const propios = retiros.filter(r => r.socio === s.nombre);
    totalesPorSocio[s.nombre] = {
      total: propios.reduce((a, r) => a + (Number(r.monto) || 0), 0),
      cantidad: propios.length,
      pct: s.pct,
    };
  });

  // Utilidad del ejercicio (mismo cálculo que el dashboard)
  const ingresosNetos = (S.facturas || []).filter(f => f.estado !== 'anulada').reduce((a, f) => a + (Number(f.neto) || 0), 0);
  const gastosNetos = (S.gastos || []).reduce((a, g) => a + (Number(g.neto) || Number(g.total) || 0), 0);
  const utilidad = ingresosNetos - gastosNetos;

  const cardsSocios = socios.map(s => {
    const inf = totalesPorSocio[s.nombre] || { total: 0, cantidad: 0, pct: s.pct };
    const utilidadAsignada = utilidad * (s.pct / 100);
    const saldo = utilidadAsignada - inf.total;
    return `
      <div class="card" style="background:linear-gradient(135deg,var(--bg-card) 0%, var(--bg-soft) 100%);position:relative;overflow:hidden">

        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;position:relative">

            <div style="font-family:var(--font-display);font-size:22px;font-weight:700">${esc(s.nombre)}</div>
